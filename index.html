<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion Tactical Generator</title>
    <style>
        :root {
            --scorpion-yellow: #ffae00;
            --scorpion-dark-yellow: #c28500;
            --bg-black: #0a0a0a;
            --card-gray: #151515;
            --text-white: #e0e0e0;
            --accent-red: #8b0000;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* Тактический стиль */
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0;
            padding: 15px;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--scorpion-yellow);
            margin-bottom: 30px;
            padding-bottom: 10px;
        }

        h1 {
            color: var(--scorpion-yellow);
            text-transform: uppercase;
            font-size: 2rem;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 174, 0, 0.5);
        }

        .badge-icon {
            font-size: 3rem;
            margin-bottom: 5px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        label {
            color: var(--scorpion-yellow);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--scorpion-dark-yellow);
            color: white;
            border-radius: 0;
            cursor: pointer;
        }

        .generate-btn {
            grid-column: span 2;
            background: var(--scorpion-yellow);
            color: black;
            border: none;
            padding: 18px;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .generate-btn:hover {
            background: white;
            box-shadow: 0 0 20px var(--scorpion-yellow);
        }

        #scenario-output {
            display: none;
            border: 2px solid var(--scorpion-yellow);
            padding: 30px;
            margin-top: 30px;
            position: relative;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .scen-title {
            color: var(--scorpion-yellow);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-label {
            color: var(--scorpion-yellow);
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 8px;
            display: block;
        }

        .content {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #ccc;
            text-align: justify;
        }

        .twist-box {
            background: rgba(139, 0, 0, 0.1);
            border: 1px solid var(--accent-red);
            padding: 15px;
            margin-top: 20px;
        }

        .twist-box b { color: var(--accent-red); }

        @media (max-width: 600px) {
            .settings-grid { grid-template-columns: 1fr; }
            .generate-btn { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="badge-icon">🦂</div>
        <h1>Scorpion Scenario Gen</h1>
    </header>

    <div class="settings-grid">
        <div>
            <label>ТЕРРИТОРИЯ</label>
            <select id="terrain">
                <option value="forest">ЛЕСНОЙ МАССИВ</option>
                <option value="urban">УРБАН / ЗАСТРОЙКА</option>
                <option value="cqb">CQB (ПОМЕЩЕНИЯ)</option>
            </select>
        </div>
        <div>
            <label>ИНТЕНСИВНОСТЬ</label>
            <select id="intensity">
                <option value="low">РАЗВЕДКА (НИЗКАЯ)</option>
                <option value="med" selected>КОНТАКТ (СРЕДНЯЯ)</option>
                <option value="high">МЯСОРУБКА (ВЫСОКАЯ)</option>
            </select>
        </div>
        <button class="generate-btn" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="scenario-output">
        <div class="scen-title" id="out-title">КОДОВОЕ НАЗВАНИЕ</div>
        
        <div class="section">
            <span class="section-label">ОПЕРАТИВНАЯ СВОДКА (ЛЕГЕНДА):</span>
            <div class="content" id="out-lore"></div>
        </div>

        <div class="section">
            <span class="section-label">БОЕВАЯ ЗАДАЧА:</span>
            <div class="content" id="out-task"></div>
        </div>

        <div class="twist-box">
            <b>ВВОДНАЯ "СКОРПИОН":</b> <span id="out-twist"></span>
        </div>
    </div>
</div>

<script>
const data = {
    titles: ["Острый хвост", "Песчаная буря", "Яд тишины", "Черная метка", "Жало", "Стальной панцирь", "Ночной охотник", "Смертельный укус", "Клешни", "Пустынный призрак"],
    
    lores: [
        "Разведка докладывает: в данном квадрате зафиксирована активность наемников. По нашим данным, они удерживают зашифрованный кейс с кодами доступа к спутниковой сети. Если информация утечет — весь регион окажется под угрозой. Ваша группа выдвигается в качестве передового отряда для перехвата инициативы. Сопротивление ожидается организованное и агрессивное.",
        "После крушения транспортного вертолета в зоне ответственности нашего подразделения, пропал важный сотрудник корпорации 'Aegis'. Поисковые маяки молчат. Местные радикальные группировки уже начали прочесывать местность. Ваша задача — опередить противника и обеспечить безопасный коридор для эвакуации, пока кольцо окружения не замкнулось.",
        "Старый промышленный сектор стал камнем преткновения между двумя ЧВК. Объект имеет стратегическое значение из-за системы подземных коммуникаций. Командование отдало приказ: занять ключевые узлы связи и удерживать их любой ценой. Будьте готовы к тому, что противник задействует тяжелые штурмовые щиты и дымовые завесы.",
        "Внимание, группы! В секторе обнаружен схрон с химоружием, оставленный при отступлении регулярных войск. Группа 'Север' должна произвести дезактивацию, группа 'Юг' получила приказ не допустить этого, так как имеет свои планы на данные ресурсы. Погода ухудшается, связь будет нестабильной.",
        "Мирная демонстрация в пригороде переросла в вооруженный конфликт. Под прикрытием хаоса, диверсионная группа противника закрепилась в ключевых зданиях. Нам нужно выбить их оттуда до прихода основных сил. Спецсредства разрешены, огонь на подавление — по готовности."
    ],

    tasks: {
        forest: [
            "Установить контроль над тремя точками: 'Вышка', 'Родник' и 'Овраг'. Удержание каждой точки дает очки каждые 5 минут.",
            "Найти в лесу разбитый ящик с боеприпасами, эвакуировать его на свою базу. Ящик тяжелый, нести можно только вдвоем.",
            "Провести VIP-персону через лесную тропу к точке эвакуации. Вторая команда устраивает засады по всему маршруту."
        ],
        urban: [
            "Захватить центральное здание и вывесить флаг на крыше. Удерживать флаг до конца раунда.",
            "Обеим командам необходимо собрать 10 разбросанных по полигону 'энергоблоков'. Чья команда принесет больше в свой штаб — та победила.",
            "Штурм укрепленного штаба. У обороны одна жизнь, у атаки — бесконечный респаун, но ограниченное время (15 минут)."
        ],
        cqb: [
            "Разминирование: Атака должна найти и отключить таймер. Оборона знает расположение, но не может подходить к нему ближе 3 метров.",
            "Встречный бой за центральный холл. Каждые 2 минуты в игру вступает 'джаггернаут' со щитом на стороне проигрывающей команды.",
            "Зачистка всех комнат этажа. Каждая комната считается захваченной, если внутри не осталось противника и оставлен маркер."
        ]
    },

    twists: [
        "Ранение в руку — нельзя использовать привод (только пистолет). Ранение в ногу — только ползком или с помощью товарища.",
        "Радиомолчание: использование раций запрещено. Только жесты и голосовые команды.",
        "Последний шанс: если вас убили, вы можете остаться на месте как 'раненый' еще на 5 минут и передавать информацию голосом.",
        "Ограниченный БК: использовать можно только один магазин (механу), дозарядка запрещена до захвата точки снабжения.",
        "Предатель: в каждой команде есть один игрок, который по сигналу ракетницы переходит на сторону врага.",
        "Дымовая завеса: каждые 10 минут организаторы (или мертвые) активируют дымы в случайных точках."
    ]
};

function generate() {
    const terrain = document.getElementById('terrain').value;
    const output = document.getElementById('scenario-output');
    
    // Генерируем случайный набор
    const title = data.titles[Math.floor(Math.random() * data.titles.length)];
    const lore = data.lores[Math.floor(Math.random() * data.lores.length)];
    const taskList = data.tasks[terrain];
    const task = taskList[Math.floor(Math.random() * taskList.length)];
    const twist = data.twists[Math.floor(Math.random() * data.twists.length)];

    // Вывод
    document.getElementById('out-title').innerText = "ОПЕРАЦИЯ: " + title.toUpperCase();
    document.getElementById('out-lore').innerText = lore;
    document.getElementById('out-task').innerText = task;
    document.getElementById('out-twist').innerText = twist;

    // Показываем результат
    output.style.display = 'block';
    window.scrollTo({ top: output.offsetTop, behavior: 'smooth' });
}
</script>
</body>
</html>
