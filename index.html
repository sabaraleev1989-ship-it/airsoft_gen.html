<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCORPION.GEN 2.0</title>
    
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --gold: #c5a059; /* Песочное золото шеврона */
            --dark-gold: #8b6d31;
            --bg: #050505;
            --panel: #111111;
            --red: #a80000;
            --text: #e5e5e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--gold);
            background: var(--bg);
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Надпись версии слева сверху */
        .version-tag {
            position: absolute;
            top: 12px;
            left: 15px;
            color: var(--gold);
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header {
            text-align: center;
            padding: 40px 10px 15px;
            border-bottom: 1px solid var(--gold);
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 2px;
            margin: 0;
        }

        .settings {
            padding: 20px;
            display: grid;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        select {
            background: #1a1a1a;
            border: 1px solid var(--dark-gold);
            color: white;
            padding: 12px;
            font-size: 14px;
            outline: none;
            border-radius: 0;
        }

        .btn-gen {
            background: var(--gold);
            color: black;
            border: none;
            padding: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .btn-gen:active {
            background: white;
        }

        /* Область вывода результата */
        #output {
            display: none;
            padding: 20px;
            border-top: 2px solid var(--gold);
            background: linear-gradient(to bottom, #0a0a0a, #050505);
        }

        .scen-title {
            color: var(--gold);
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .scen-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h3 {
            color: var(--gold);
            font-size: 13px;
            text-transform: uppercase;
            margin: 20px 0 8px;
            display: flex;
            align-items: center;
        }

        h3::before {
            content: "";
            width: 4px;
            height: 14px;
            background: var(--gold);
            margin-right: 10px;
        }

        .text-block {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 2px;
            text-align: justify;
        }

        /* Красный блок вводной */
        .rules-box {
            border: 1px solid var(--red);
            background: rgba(168, 0, 0, 0.08);
            padding: 15px;
            margin-top: 25px;
        }

        .rules-box h4 {
            color: #ff4d4d;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: bold;
        }

        .rules-list {
            font-size: 13px;
            margin: 0;
            padding-left: 18px;
            color: #ff9999;
        }

        .rules-list li {
            margin-bottom: 10px;
        }

        .rules-list b {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="version-tag">scorpion.gen 2.0</div>
    
    <header>
        <h1>Сценарии к играм</h1>
    </header>

    <div class="settings">
        <div class="input-group">
            <label>Тип полигона</label>
            <select id="terrain">
                <option value="forest">Лесной массив</option>
                <option value="urban">Урбан / Застройка</option>
                <option value="cqb">CQB (Помещения)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Состав групп</label>
            <select id="players">
                <option value="10-20">10 - 20 человек</option>
                <option value="20-50" selected>20 - 50 человек</option>
                <option value="50+">50+ человек (Масштаб)</option>
            </select>
        </div>

        <button class="btn-gen" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="output">
        <div id="out-name" class="scen-title">ОПЕРАЦИЯ: НЕИЗВЕСТНО</div>
        <div id="out-meta" class="scen-meta">Тип местности | Состав</div>

        <h3>Оперативная легенда</h3>
        <div id="out-lore" class="text-block"></div>

        <h3>Боевая задача</h3>
        <div id="out-task" class="text-block"></div>

        <div class="rules-box">
            <h4>Вводная "СКОРПИОН" (Правила поражения):</h4>
            <ul class="rules-list" id="out-rules">
                </ul>
        </div>
    </div>
</div>

<script>
const library = {
    names: ["Черное Жало", "Песчаный Плен", "Тихий Выстрел", "Стальной Панцирь", "Ночной Охотник", "Горный Узел"],
    
    lores: [
        "По данным разведки, в этом квадрате замечена активность диверсионной группы. Противник удерживает зашифрованный кейс с кодами управления спутниками. Если информация будет передана, мы потеряем связь во всем регионе. Команда 'Скорпион' должна перехватить инициативу, обнаружить штаб врага и нейтрализовать угрозу до заката.",
        "Критический сбой: транспортный вертолет с важным грузом совершил аварийную посадку. Территория падения кишит патрулями наемников. Группам необходимо оцепить район, найти бортовой самописец и удержать точку эвакуации до прибытия подкрепления. Будьте осторожны — противник хорошо вооружен и использует тепловизоры.",
        "Старый складской комплекс стал точкой интереса для двух ЧВК. Объект содержит запасы горючего, необходимые для продолжения наступления. Командование приказало закрепиться на объекте и выбить противника из прилегающих зданий. Каждый метр будет стоить усилий, используйте тактические щиты и дымы."
    ],

    tasks: {
        forest: "Поиск и захват 3-х флагов, рассредоточенных по лесу. За каждый доставленный на базу флаг команда получает очки. Дозарядка разрешена только у штабного ящика.",
        urban: "Штурм и удержание двухэтажного здания. Задача Атаки — вывесить свой флаг на крыше. Задача Обороны — не допустить касания флага в течение 30 минут.",
        cqb: "Ближний бой. Задача — найти в одной из комнат электронную бомбу и деактивировать её. Обороне запрещено блокировать двери мебелью."
    },

    // КОНКРЕТНЫЕ ПРАВИЛА ПОРАЖЕНИЯ
    hitRules: [
        "<b>Попадание в корпус или голову:</b> Мгновенная смерть. Игрок поднимает красную повязку и следует в мертвяк.",
        "<b>Попадание в руку:</b> Тяжелое ранение. Нельзя использовать основное оружие. Разрешена только вторичка (пистолет) в здоровой руке. Требуется бинтование в течение 2 минут.",
        "<b>Попадание в ногу:</b> Тяжелое ранение. Передвижение только ползком или с помощью товарища. Требуется бинтование.",
        "<b>Повторное попадание в раненого:</b> Окончательная смерть.",
        "<b>Лечение:</b> Бинтование любым товарищем. Время наложения бинта — честные 30 секунд. После этого боец снова в строю."
    ]
};

function generate() {
    const terrain = document.getElementById('terrain').value;
    const players = document.getElementById('players').value;
    
    // Рандом названия и легенды
    document.getElementById('out-name').innerText = "ОПЕРАЦИЯ: " + library.names[Math.floor(Math.random() * library.names.length)];
    document.getElementById('out-lore').innerText = library.lores[Math.floor(Math.random() * library.lores.length)];
    
    // Описание местности и состава
    const terrainNames = {forest: "Лесной массив", urban: "Урбан / Застройка", cqb: "CQB (Помещения)"};
    document.getElementById('out-meta').innerText = `${terrainNames[terrain]} | Состав: ${players}`;
    
    // Боевая задача
    document.getElementById('out-task').innerText = library.tasks[terrain];

    // Заполнение четких правил
    const rulesList = document.getElementById('out-rules');
    rulesList.innerHTML = "";
    library.hitRules.forEach(rule => {
        const li = document.createElement('li');
        li.innerHTML = rule;
        rulesList.appendChild(li);
    });

    // Показываем блок с анимацией
    const output = document.getElementById('output');
    output.style.display = 'block';
    
    // Плавный скролл вниз к результату
    window.scrollTo({ top: output.offsetTop, behavior: 'smooth' });
}
</script>

</body>
</html>
