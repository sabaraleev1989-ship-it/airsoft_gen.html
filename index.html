<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCORPION.GEN 2.0</title>
    <style>
        :root {
            --gold: #c5a059; /* Песочное золото шеврона */
            --dark-gold: #8b6d31;
            --bg: #050505;
            --panel: #111111;
            --red: #a80000;
            --text: #e5e5e5;
        }

        body {
            font-family: 'Tahoma', 'Geneva', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        /* Общий контейнер */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid var(--gold);
            background: var(--bg);
            position: relative;
            padding-bottom: 20px;
        }

        /* Маркировка версии */
        .version-tag {
            position: absolute;
            top: 10px;
            left: 15px;
            color: var(--gold);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        header {
            text-align: center;
            padding: 30px 10px 10px;
            border-bottom: 1px solid var(--gold);
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 3px;
            margin: 10px 0;
        }

        /* Настройки */
        .settings {
            padding: 20px;
            display: grid;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        select {
            background: #1a1a1a;
            border: 1px solid var(--dark-gold);
            color: white;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        .btn-gen {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-gen:hover { background: white; }

        /* Вывод сценария */
        #output {
            display: none;
            padding: 20px;
            border-top: 2px solid var(--gold);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scen-header {
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .scen-title {
            color: var(--gold);
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .scen-meta {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        h3 {
            color: var(--gold);
            font-size: 14px;
            text-transform: uppercase;
            margin: 15px 0 5px;
            border-left: 3px solid var(--gold);
            padding-left: 10px;
        }

        .text-block {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            background: rgba(255,255,255,0.03);
            padding: 10px;
        }

        /* Блок Вводной (Красный) */
        .rules-box {
            border: 1px solid var(--red);
            background: rgba(168, 0, 0, 0.05);
            padding: 15px;
            margin-top: 20px;
        }

        .rules-box h4 {
            color: var(--red);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-size: 13px;
        }

        .rules-list {
            font-size: 13px;
            margin: 0;
            padding-left: 15px;
            color: #ff9999;
        }

        .rules-list li { margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="version-tag">SCORPION.GEN 2.0</div>
    
    <header>
        <h1>Сценарии к играм</h1>
    </header>

    <div class="settings">
        <div class="input-group">
            <label>Тип полигона</label>
            <select id="terrain">
                <option value="forest">Лесной массив</option>
                <option value="urban">Урбан / Здания</option>
                <option value="cqb">CQB (Тесные помещения)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Состав групп</label>
            <select id="players">
                <option value="10-20">Малые группы (10-20 чел)</option>
                <option value="20-50" selected>Средний состав (20-50 чел)</option>
                <option value="50+">Большой сбор (50+ чел)</option>
            </select>
        </div>

        <button class="btn-gen" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="output">
        <div class="scen-header">
            <div id="out-name" class="scen-title">ОПЕРАЦИЯ: НЕИЗВЕСТНО</div>
            <div id="out-meta" class="scen-meta">Лес | 20-50 чел</div>
        </div>

        <h3>Оперативная легенда</h3>
        <div id="out-lore" class="text-block"></div>

        <h3>Боевая задача</h3>
        <div id="out-task" class="text-block"></div>

        <div class="rules-box">
            <h4>Вводная "СКОРПИОН" (Правила поражения):</h4>
            <ul class="rules-list" id="out-rules">
                </ul>
        </div>
    </div>
</div>

<script>
const library = {
    names: ["Черный песок", "Укус кобры", "Спящий скорпион", "Стальное жало", "Гром в горах", "Тень Адлера"],
    
    lores: [
        "Внимание! Разведка перехватила данные о секретной поставке медикаментов и боеприпасов для повстанцев. Груз замаскирован под гражданские ящики и находится в транзитной зоне. Ваша задача — взять зону под контроль до прибытия основных сил противника. В случае обнаружения превосходящих сил — перейти к глухой обороне периметра. Ошибка недопустима, на кону снабжение всего южного фронта.",
        "Критическая ситуация: в заброшенном секторе связи произошел сбой системы оповещения. По нашим данным, диверсионная группа уже закрепилась на узловых точках и готовит подрыв ретранслятора. Если связь будет потеряна, мы не сможем координировать авиацию. Группа 'Скорпион' выдвигается для немедленной зачистки и восстановления контроля над терминалами связи.",
        "Чрезвычайное происшествие. В ходе патрулирования был сбит союзный дрон-разведчик. На его борту — жесткий диск с координатами наших складов. Координаты падения известны приблизительно. Противник уже выслал поисковые отряды. Вам необходимо прочесать квадрат, найти обломки и уничтожить носитель информации, либо доставить его в точку эвакуации."
    ],

    tasks: {
        forest: "Захват и удержание 3-х контрольных точек в течение 30 минут. Команда А стартует с северного респауна, Команда Б — с южного. Дозарядка разрешена только на контрольных точках.",
        urban: "Поиск и эвакуация 'Ценного сотрудника' (игрок в ярком жилете). Атака должна вывести его за периметр зданий, Оборона — удерживать в подвале. Время на операцию: 40 минут.",
        cqb: "Встречный бой за центральный терминал. Задача: занести в комнату терминала свой кейс и удерживать его 10 минут. В случае выноса кейса противником таймер сбрасывается."
    },

    // ЧЕТКИЕ ПРАВИЛА ПОРАЖЕНИЯ
    hitRules: [
        [
            "<b>Попадание в корпус:</b> Мгновенная смерть. Игрок поднимает красную тряпку и уходит в мертвяк.",
            "<b>Попадание в конечность:</b> Ранение. Игрок обязан упасть, громко крикнуть 'Ранен!' и может только отстреливаться из пистолета (при ранении в руку) или только ползти (при ранении в ногу).",
            "<b>Повторное попадание в раненого:</b> Смерть. Игрок уходит в мертвяк.",
            "<b>Лечение:</b> Другой игрок может перебинтовать раненого (30 секунд контакта). После бинтования игрок полностью в строю."
        ],
        [
            "<b>Попадание в любую часть тела:</b> Игрок считается раненым. Должен сесть на месте, не может стрелять и говорить. Ждет медика 3 минуты.",
            "<b>Если медик не успел:</b> Игрок считается 'истекшим кровью' и уходит в мертвяк.",
            "<b>Попадание в привод:</b> Оружие выведено из строя до конца жизни. Игрок может использовать только вторичку или нож."
        ]
    ]
};

function generate() {
    const terrain = document.getElementById('terrain').value;
    const players = document.getElementById('players').value;
    
    // Название и легенда
    document.getElementById('out-name').innerText = "ОПЕРАЦИЯ: " + library.names[Math.floor(Math.random() * library.names.length)];
    document.getElementById('out-lore').innerText = library.lores[Math.floor(Math.random() * library.lores.length)];
    
    // Мета (Тип и кол-во человек)
    const tMap = {forest: "Лес", urban: "Урбан", cqb: "CQB"};
    document.getElementById('out-meta').innerText = `${tMap[terrain]} | ${players}`;
    
    // Задача
    document.getElementById('out-task').innerText = library.tasks[terrain];

    // Правила поражения (выбираем один из двух пресетов для разнообразия)
    const rulesList = document.getElementById('out-rules');
    rulesList.innerHTML = "";
    const selectedRules = library.hitRules[Math.floor(Math.random() * library.hitRules.length)];
    
    selectedRules.forEach(rule => {
        const li = document.createElement('li');
        li.innerHTML = rule;
        rulesList.appendChild(li);
    });

    document.getElementById('output').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>

</body>
</html>
