<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Страйкбольных Сценариев</title>
    <style>
        :root {
            --primary-color: #556b2f; /* Dark Olive Green */
            --secondary-color: #8fbc8f; /* Dark Sea Green */
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #daa520; /* Goldenrod */
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }

        h1 {
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.8rem;
        }

        /* Секция Настроек */
        .settings-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .setting-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        select {
            width: 100%;
            padding: 12px;
            background-color: #3d3d3d;
            border: 1px solid #555;
            border-radius: 4px;
            color: var(--text-color);
            font-size: 1rem;
            appearance: none; /* Убираем стандартную стрелочку */
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .btn-generate {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-generate:hover {
            background-color: #6b8e23;
        }

        .btn-generate:active {
            transform: translateY(1px);
        }

        /* Секция Результата */
        #result-area {
            display: none; /* Скрыто по умолчанию */
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        .scenario-name {
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        .meta-info {
            font-size: 0.9rem;
            color: #aaa;
            text-align: right;
        }

        .result-section {
            margin-bottom: 15px;
        }

        .result-section h3 {
            color: var(--secondary-color);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .result-section p {
            background-color: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 4px;
        }

        .twist-box {
            border: 1px dashed var(--accent-color);
            color: var(--accent-color);
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.5rem; }
            .result-header { flex-direction: column; align-items: flex-start; }
            .meta-info { text-align: left; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Tactical Scenario Generator</h1>
    </header>

    <div class="settings-card">
        <div class="setting-group">
            <label for="terrain">Тип полигона</label>
            <select id="terrain">
                <option value="any">Любой</option>
                <option value="forest">Лес / Зеленка</option>
                <option value="cqb">CQB / Здание</option>
                <option value="urban">Урбан / Стройка</option>
            </select>
        </div>

        <div class="setting-group">
            <label for="players">Количество игроков</label>
            <select id="players">
                <option value="small">Малая группа (до 15)</option>
                <option value="medium" selected>Средняя (15 - 50)</option>
                <option value="large">Масштаб (50+)</option>
            </select>
        </div>

        <button class="btn-generate" onclick="generateScenario()">Сгенерировать миссию</button>
    </div>

    <div id="result-area">
        <div class="result-card">
            <div class="result-header">
                <div class="scenario-name" id="scen-name">Название Миссии</div>
                <div class="meta-info">
                    <span id="scen-meta-terrain">Лес</span> | 
                    <span id="scen-meta-players">~30 чел</span>
                </div>
            </div>

            <div class="result-section">
                <h3>Легенда</h3>
                <p id="scen-lore">Описание предыстории.</p>
            </div>

            <div class="result-section">
                <h3>Задачи</h3>
                <p id="scen-task">Что нужно сделать.</p>
            </div>

            <div class="result-section twist-box">
                <h3>Тактическое усложнение ("Твист")</h3>
                <p id="scen-twist">Особые условия.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // БАЗА ДАННЫХ КОМПОНЕНТОВ СЦЕНАРИЕВ
    
    const names = [
        "Черный Ящик", "Заря", "Эвакуация VIP", "Высота 777", "Прорыв", 
        "Операция 'Магистраль'", "Конвой", "Спящий Агент", "Охота на Снайпера", "Ценный Груз"
    ];

    const objectivePool = {
        // Задачи, подходящие для леса
        forest: [
            { task: "Стороне А найти сбитый БПЛА в центральном квадрате, забрать флешку и доставить в штаб. Стороне Б - перехватить флешку или уничтожить курьера.", twist: "Курьер может использовать только вторичное оружие при переносе флешки." },
            { task: "Классический захват флага. Флаги находятся на базах команд. Задача - принести флаг противника на свою базу.", twist: "Ограничение боезапаса: только механы, дозарядка только на мертвяке." },
            { task: "Удержание контрольной точки (высоты/бункера). Побеждает команда, суммарно владевшая точкой 30 минут.", twist: "Использование дымов запрещено из-за пожароопасности (или наоборот, поощряется)." }
        ],
        // Задачи для зданий
        cqb: [
            { task: "Зачистка здания. Сторона А обороняет 3 этаж. Сторона Б должна зачистить все комнаты. Игра на время.", twist: "Обороне разрешен только 1 щит, атаке щиты запрещены." },
            { task: "Освобождение заложника. Заложник (игрок без оружия) находится в дальней комнате. Атаке нужно вывести его наружу.", twist: "Заложник может сбежать, если его охранник убит и рядом нет других бойцов обороны." },
            { task: "Установка бомбы. Атака должна установить электронный таймер в центральном зале и защищать его 10 минут до 'взрыва'.", twist: "Только один игрок в команде атаки (инженер) имеет право устанавливать/снимать бомбу." }
        ],
        // Задачи для урбана (смешанный тип)
        urban: [
            { task: "Проводка VIP через условную улицу. VIP должен дойти живым до точки эвакуации.", twist: "У VIP есть 2 бинта для самопомощи, у остальных игроков медиков нет." },
            { task: "Сбор разведданных. По полигону спрятано 5 кейсов. Командам нужно собрать большинство и доставить в штаб.", twist: "Появилась третья сторона (террористы, 3-5 чел), воюющая против всех." },
            { task: "Уничтожение радиостанции. Сторона А удерживает здание радиостанции, Сторона Б должна коснуться макета радиостанции рукой.", twist: "Ранения: при попадании в конечность игрок падает и ждет медика 2 минуты." }
        ]
    };

    const loreTemplates = [
        "По данным разведки, в этом секторе потерпел крушение разведывательный спутник...",
        "Местный полевой командир захватил в заложники журналиста...",
        "Радикальная группировка захватила заброшенный химический завод...",
        "Элитный отряд попал в засаду при транспортировке кодов доступа...",
        "Старый бункер времен холодной войны оказался не таким уж пустым...",
        "Две частные военные компании не поделили контракт на охрану объекта..."
    ];

    const sizeMap = {
        small: "до 15 чел",
        medium: "15 - 50 чел",
        large: "50+ чел"
    };

    // ГЛАВНАЯ ФУНКЦИЯ ГЕНЕРАЦИИ
    function generateScenario() {
        // 1. Получаем настройки от пользователя
        const terrainInput = document.getElementById('terrain').value;
        const playersInput = document.getElementById('players').value;

        // 2. Логика выбора типа полигона
        let validTerrains = [];
        if (terrainInput === 'any') {
            validTerrains = ['forest', 'cqb', 'urban'];
        } else {
            validTerrains = [terrainInput];
        }
        
        // Случайно выбираем один из доступных типов (если был 'any')
        const selectedTerrain = validTerrains[Math.floor(Math.random() * validTerrains.length)];

        // 3. Выбор задач на основе типа полигона
        const currentObjectivePool = objectivePool[selectedTerrain];
        
        // Масштабируемость: Если игроков мало, убираем сложные сценарии (в этом примере просто выбор)
        const scenarioPair = currentObjectivePool[Math.floor(Math.random() * currentObjectivePool.length)];

        // 4. Подстановка данных в интерфейс
        
        // Рандомное название
        document.getElementById('scen-name').innerText = names[Math.floor(Math.random() * names.length)];
        
        // Мета-данные
        const terrainNamesToRu = { forest: "Лес", cqb: "Здание", urban: "Урбан" };
        document.getElementById('scen-meta-terrain').innerText = terrainNamesToRu[selectedTerrain];
        document.getElementById('scen-meta-players').innerText = sizeMap[playersInput];
        
        // Легенда, Задача и Твист
        document.getElementById('scen-lore').innerText = loreTemplates[Math.floor(Math.random() * loreTemplates.length)];
        document.getElementById('scen-task').innerText = scenarioPair.task;
        document.getElementById('scen-twist').innerText = scenarioPair.twist;

        // 5. Показываем область результата с анимацией
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        
        // Прокрутка вниз к результату на мобильных
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
