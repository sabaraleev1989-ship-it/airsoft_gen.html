<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION.GEN 4.1</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#c5a059">
    <style>
        :root { --gold: #c5a059; --dark-gold: #8b6d31; --bg: #050505; --red: #a80000; --text: #e5e5e5; --bright-red: #ff3333; --bright-blue: #33aaff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; border: 1px solid var(--gold); background: var(--bg); position: relative; min-height: 95vh; padding-bottom: 20px;}
        .version-tag { position: absolute; top: 12px; left: 15px; color: var(--gold); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        header { text-align: center; padding: 40px 10px 15px; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); text-transform: uppercase; font-size: 18px; letter-spacing: 2px; margin: 0; }
        .settings { padding: 20px; display: grid; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
        select { background: #1a1a1a; border: 1px solid var(--dark-gold); color: white; padding: 12px; font-size: 16px; width: 100%; border-radius: 0; -webkit-appearance: none; }
        .btn-gen { background: var(--gold); color: black; border: none; padding: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        #output { display: none; padding: 20px; border-top: 2px solid var(--gold); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .scen-title { color: var(--gold); font-size: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        h3 { color: var(--gold); font-size: 13px; text-transform: uppercase; margin: 20px 0 8px; display: flex; align-items: center; border-left: 3px solid var(--gold); padding-left: 10px; }
        .text-block { font-size: 14px; line-height: 1.5; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 10px; white-space: pre-line; }
        .team-box { margin-bottom: 15px; border-left: 3px solid #555; padding-left: 12px; }
        .team-a { border-color: var(--bright-red); } 
        .team-b { border-color: var(--bright-blue); }
        .team-name { font-weight: bold; font-size: 13px; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
        .team-a .team-name { color: var(--bright-red); } 
        .team-b .team-name { color: var(--bright-blue); }
        .rules-box { border: 1px solid var(--red); background: rgba(168, 0, 0, 0.08); padding: 15px; margin-top: 20px; }
        .rules-list { font-size: 13px; padding-left: 18px; color: #ff9999; margin: 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="version-tag">scorpion.gen 4.1 | RED VS BLUE</div>
    <header><h1>Сценарии к играм</h1></header>
    <div class="settings">
        <label>Локация</label>
        <select id="terrain">
            <option value="forest">Чистый лес</option>
            <option value="mixed" selected>Лес + Здания</option>
            <option value="cqb">CQB (Помещения)</option>
        </select>
        <label>Группа</label>
        <select id="players">
            <option value="small">Малая (0-10 чел)</option>
            <option value="mid">Средняя (10-25 чел)</option>
            <option value="large">Масштаб (25-50+ чел)</option>
        </select>
        <button class="btn-gen" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="output">
        <div id="out-name" class="scen-title"></div>
        <div id="out-meta" style="font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 15px;"></div>
        
        <h3>Брифинг / Легенда</h3>
        <div id="out-lore" class="text-block"></div>
        
        <h3>Задачи сторон</h3>
        <div class="team-box team-a">
            <div class="team-name">ГРУППА А (Атака / КРАСНЫЕ)</div>
            <div id="out-task-a" class="text-block" style="background: none; padding: 0; margin-bottom: 0;"></div>
        </div>
        <div class="team-box team-b">
            <div class="team-name">ГРУППА Б (Оборона / СИНИЕ)</div>
            <div id="out-task-b" class="text-block" style="background: none; padding: 0; margin-bottom: 0;"></div>
        </div>

        <div class="rules-box">
            <h4 id="rules-style-name" style="color: #ff4d4d; margin:0 0 10px 0; text-transform:uppercase; font-size:12px;"></h4>
            <ul id="out-rules" class="rules-list"></ul>
        </div>
    </div>
</div>

<script>
// Тот же массив данных с 300+ комбинациями
const dataBank = {
    forest: {
        lores: ["Разведка обнаружила в глубине леса зашифрованный маяк связи.", "В квадрате приземлился груз с секретными чертежами ПВО.", "Группа наемников готовит подрыв важной лесной переправы.", "Сбитый пилот скрывается в зеленке, у него ключи от штаба.", "Противник развернул в лесу мобильную точку сбора данных.", "Обнаружен заброшенный склад медикаментов старой армии.", "В лесу замечена группа диверсантов, закладывающая мины.", "Разведывательный дрон упал в труднодоступном секторе леса.", "По данным ГРУ, здесь находится скрытая база снабжения врага.", "Радиоперехват выявил точку встречи двух вражеских связных."],
        objs: ["маяк связи", "секретный кейс", "мост (ориентир)", "пилота", "серверный терминал", "ящики с БК", "генератор", "сбитый дрон", "карту минных полей", "офицера"],
        actions: [
            { a: "Найти [OBJ] и удерживать 15 минут.", b: "Защищать [OBJ], не давая противнику занять периметр." },
            { a: "Эвакуировать [OBJ] в свою стартовую зону.", b: "Перехватить [OBJ] и доставить на свою базу." },
            { a: "Установить учебный заряд на [OBJ] и дождаться 'взрыва'.", b: "Обеспечить круговую оборону [OBJ], разминировать в случае успеха А." }
        ]
    },
    mixed: {
        lores: ["Комплекс зданий в лесу превращен в центр допросов противника.", "В лесу около промзоны застряла машина с топливом.", "Старая подстанция питает радар в лесном массиве.", "В здании удерживают инженера, знающего коды запуска.", "В заброшенной лаборатории хранятся образцы хим-оружия.", "Окраина леса используется врагом для корректировки огня.", "Промзона стала точкой сбора штурмовых отрядов противника.", "В здании развернут штаб управления лесными патрулями.", "На крыше объекта установлен комплекс РЭБ.", "Объект 'Зеро' окружен лесом, там замечена активность VIP."],
        objs: ["штабную рацию", "грузовик (маркер)", "подстанцию", "инженера", "образцы вируса", "пункт наведения", "точку сбора", "карту лесных дорог", "антенну РЭБ", "VIP-персону"],
        actions: [
            { a: "Отключить питание в лесу и штурмовать здание для захвата [OBJ].", b: "Распределить силы между лесом и обороной здания с [OBJ]." },
            { a: "Вынести [OBJ] из здания и спрятать в указанном секторе леса.", b: "Зачистить здание и найти спрятанный [OBJ] в лесу." },
            { a: "Занять здание и удерживать [OBJ] под обстрелом из зеленки.", b: "Выбить противника из здания, используя лес как укрытие." }
        ]
    },
    cqb: {
        lores: ["Здание заблокировано автоматикой. Внутри активирована бомба.", "Офисный центр захвачен боевиками для обмена данными.", "В подвале комплекса скрывается лидер ячейки наемников.", "Серверная комната содержит данные о всех агентах в регионе.", "В здании находится склад запрещенного снаряжения.", "Патруль противника зажат в здании, идет попытка прорыва.", "Внутри комплекса заложена 'грязная' бомба.", "В здании проводится секретное совещание командиров.", "Объект содержит единственный работающий терминал связи.", "В коридорах заложены ловушки, здание под охраной 'элиты'."],
        objs: ["таймер бомбы", "ноутбук", "лидера", "жесткий диск", "ящик с БК", "черный ход", "активатор", "сейф с кодами", "главный сервер", "план эвакуации"],
        actions: [
            { a: "Проникнуть в центр и захватить [OBJ] за 10 минут.", b: "Удерживать [OBJ]. В случае контакта — эвакуировать на 2 этаж." },
            { a: "Заложить маяк на [OBJ] и удерживать позицию.", b: "Не дать противнику подойти к [OBJ]. Использовать засады." },
            { a: "Найти [OBJ] и вынести через главный вход.", b: "Блокировать все выходы и не дать вынести [OBJ]." }
        ]
    }
};

const tactics = {
    small: ["Работа двойками.", "Тихий вход без стрельбы.", "Смена позиций после 2 выстрелов."],
    mid: ["Группы 'Альфа' и 'Браво' заходят с флангов.", "Дымовая завеса при штурме.", "Радиомолчание до контакта."],
    large: ["Фронтальное подавление огнем.", "Работа тремя эшелонами.", "Снайперская поддержка из тыла."]
};

function getQueueKey(terrain, players) { return `v41_queue_${terrain}_${players}`; }

function generate() {
    const terrain = document.getElementById('terrain').value;
    const players = document.getElementById('players').value;
    const key = getQueueKey(terrain, players);
    
    let queue = JSON.parse(localStorage.getItem(key) || "[]");
    
    if (queue.length === 0) {
        const db = dataBank[terrain];
        for(let l=0; l<db.lores.length; l++) {
            for(let o=0; o<db.objs.length; o++) {
                for(let a=0; a<db.actions.length; a++) {
                    queue.push({ l, o, a });
                }
            }
        }
        for (let i = queue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [queue[i], queue[j]] = [queue[j], queue[i]];
        }
    }

    const current = queue.shift();
    localStorage.setItem(key, JSON.stringify(queue));

    const db = dataBank[terrain];
    const lore = db.lores[current.l];
    const objName = db.objs[current.o];
    const mission = db.actions[current.a];

    document.getElementById('out-name').innerText = "ОПЕРАЦИЯ: " + (["АРГО", "ВУЛКАН", "СКИФ", "НЕПТУН", "ЗЕНИТ", "МАРС", "ГРАД"][Math.floor(Math.random()*7)]);
    document.getElementById('out-meta').innerText = `${terrain} | УНИКАЛЬНЫХ В БАЗЕ: ${queue.length}`;
    document.getElementById('out-lore').innerText = lore;
    
    document.getElementById('out-task-a').innerText = mission.a.replace("[OBJ]", objName.toUpperCase()) + "\n\nРЕКОМЕНДАЦИЯ: " + tactics[players][Math.floor(Math.random()*3)];
    document.getElementById('out-task-b').innerText = mission.b.replace("[OBJ]", objName.toUpperCase());

    const presets = [
        { name: "КЛАССИКА", rules: ["Любой хит — смерть.", "Привод — смерть.", "Рикошет не считается."] },
        { name: "ТАКТИКА", rules: ["Конечность — ранение (бинт).", "Голова/Корпус — смерть.", "Медик лечит 20 сек."] }
    ];
    const p = presets[Math.floor(Math.random()*2)];
    document.getElementById('rules-style-name').innerText = "ПРАВИЛА: " + p.name;
    const ul = document.getElementById('out-rules');
    ul.innerHTML = ""; p.rules.forEach(r => ul.innerHTML += `<li>${r}</li>`);

    document.getElementById('output').style.display = 'block';
    window.scrollTo({ top: document.getElementById('output').offsetTop - 20, behavior: 'smooth' });
}
</script>
</body>
</html>
