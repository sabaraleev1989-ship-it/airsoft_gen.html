<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCORPION.GEN 2.0</title>
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --gold: #c5a059;
            --dark-gold: #8b6d31;
            --bg: #050505;
            --red: #a80000;
            --text: #e5e5e5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--gold);
            background: var(--bg);
            position: relative;
        }

        .version-tag {
            position: absolute;
            top: 12px;
            left: 15px;
            color: var(--gold);
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header {
            text-align: center;
            padding: 40px 10px 15px;
            border-bottom: 1px solid var(--gold);
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 18px;
            letter-spacing: 2px;
            margin: 0;
        }

        .settings {
            padding: 20px;
            display: grid;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: bold;
        }

        select {
            background: #1a1a1a;
            border: 1px solid var(--dark-gold);
            color: white;
            padding: 12px;
            border-radius: 0;
        }

        .btn-gen {
            background: var(--gold);
            color: black;
            border: none;
            padding: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        #output {
            display: none;
            padding: 20px;
            border-top: 2px solid var(--gold);
        }

        .scen-title {
            color: var(--gold);
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .scen-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h3 {
            color: var(--gold);
            font-size: 13px;
            text-transform: uppercase;
            margin: 20px 0 8px;
            display: flex;
            align-items: center;
        }

        h3::before {
            content: "";
            width: 4px;
            height: 14px;
            background: var(--gold);
            margin-right: 10px;
        }

        .text-block {
            font-size: 14px;
            line-height: 1.6;
            color: #ccc;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            text-align: justify;
        }

        .rules-box {
            border: 1px solid var(--red);
            background: rgba(168, 0, 0, 0.08);
            padding: 15px;
            margin-top: 25px;
        }

        .rules-box h4 {
            color: #ff4d4d;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-size: 13px;
        }

        .rules-list {
            font-size: 13px;
            margin: 0;
            padding-left: 18px;
            color: #ff9999;
        }

        .rules-list li { margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="version-tag">scorpion.gen 2.0</div>
    <header><h1>Сценарии к играм</h1></header>

    <div class="settings">
        <div class="input-group">
            <label>Тип полигона</label>
            <select id="terrain">
                <option value="forest">Лесной массив</option>
                <option value="urban">Урбан / Застройка</option>
                <option value="cqb">CQB (Помещения)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Состав групп</label>
            <select id="players">
                <option value="10-20">10 - 20 человек</option>
                <option value="20-50" selected>20 - 50 человек</option>
                <option value="50+">50+ человек</option>
            </select>
        </div>
        <button class="btn-gen" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="output">
        <div id="out-name" class="scen-title"></div>
        <div id="out-meta" class="scen-meta"></div>
        <h3>Оперативная легенда</h3>
        <div id="out-lore" class="text-block"></div>
        <h3>Боевая задача</h3>
        <div id="out-task" class="text-block"></div>
        <div class="rules-box">
            <h4 id="rules-style-name">Правила поражения</h4>
            <ul class="rules-list" id="out-rules"></ul>
        </div>
    </div>
</div>

<script>
const library = {
    names: ["Черное Жало", "Песчаный Плен", "Тихий Выстрел", "Стальной Панцирь", "Ночной Охотник", "Горный Узел"],
    lores: [
        "Разведка докладывает о секретной поставке медикаментов. Груз находится в транзитной зоне. Нужно взять зону под контроль.",
        "Транспортный вертолет совершил аварийную посадку. Территория падения кишит патрулями. Найдите бортовой самописец.",
        "Старый складской комплекс стал точкой интереса двух ЧВК. Объект содержит запасы горючего. Закрепитесь на объекте."
    ],
    tasks: {
        forest: "Захват и удержание 3-х флагов в лесу. Доставка на базу дает очки.",
        urban: "Штурм здания. Атака вешает флаг на крыше, Оборона держит 30 минут.",
        cqb: "Найти в одной из комнат электронную бомбу и деактивировать её."
    },

    // ВАРИАНТЫ ПРАВИЛ ПОРАЖЕНИЯ
    hitPresets: [
        {
            name: "СТИЛЬ: КЛАССИКА (FAST GAME)",
            rules: [
                "<b>Любое попадание:</b> Смерть. Включая попадание в снаряжение, рюкзак и шлем.",
                "<b>Рикошет:</b> Не считается.",
                "<b>Дружественный огонь:</b> Считается как обычное поражение.",
                "<b>Мертвяк:</b> Выход каждые 10 минут по таймеру."
            ]
        },
        {
            name: "СТИЛЬ: ТАКТИКА (MEDIC SYSTEM)",
            rules: [
                "<b>Попадание в корпус:</b> Смерть (красная тряпка).",
                "<b>Попадание в конечность:</b> Ранение. Игрок падает, зовет медика. Может стрелять только из пистолета.",
                "<b>Медицина:</b> Перебинтовать раненого можно в течение 5 минут. Один боец — одна перевязка.",
                "<b>Повторное попадание:</b> Добивание, игрок уходит в мертвяк."
            ]
        },
        {
            name: "СТИЛЬ: ХАРДКОР (MILSIM)",
            rules: [
                "<b>Попадание в шлем/броник:</b> Контузия 1 минута (сидеть на месте, не стрелять).",
                "<b>Попадание в оружие:</b> Привод считается сломанным. Переход на вторичку.",
                "<b>Ранения:</b> Самопомощь запрещена. Только эвакуация товарищем в безопасную зону для лечения.",
                "<b>Плен:</b> Касание рукой по плечу со спины — игрок считается захваченным в плен."
            ]
        }
    ]
};

function generate() {
    const terrain = document.getElementById('terrain').value;
    const players = document.getElementById('players').value;
    
    document.getElementById('out-name').innerText = "ОПЕРАЦИЯ: " + library.names[Math.floor(Math.random() * library.names.length)];
    document.getElementById('out-lore').innerText = library.lores[Math.floor(Math.random() * library.lores.length)];
    
    const terrainNames = {forest: "Лесной массив", urban: "Урбан", cqb: "CQB"};
    document.getElementById('out-meta').innerText = `${terrainNames[terrain]} | Состав: ${players}`;
    document.getElementById('out-task').innerText = library.tasks[terrain];

    // Выбираем СЛУЧАЙНЫЙ пресет правил
    const randomPreset = library.hitPresets[Math.floor(Math.random() * library.hitPresets.length)];
    document.getElementById('rules-style-name').innerText = randomPreset.name;
    
    const rulesList = document.getElementById('out-rules');
    rulesList.innerHTML = "";
    randomPreset.rules.forEach(rule => {
        const li = document.createElement('li');
        li.innerHTML = rule;
        rulesList.appendChild(li);
    });

    document.getElementById('output').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
