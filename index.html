<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION.GEN 3.5</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#c5a059">
    <style>
        :root { --gold: #c5a059; --dark-gold: #8b6d31; --bg: #050505; --red: #a80000; --text: #e5e5e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; border: 1px solid var(--gold); background: var(--bg); position: relative; min-height: 95vh; padding-bottom: 20px;}
        .version-tag { position: absolute; top: 12px; left: 15px; color: var(--gold); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        header { text-align: center; padding: 40px 10px 15px; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); text-transform: uppercase; font-size: 18px; letter-spacing: 2px; margin: 0; }
        .settings { padding: 20px; display: grid; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
        select { background: #1a1a1a; border: 1px solid var(--dark-gold); color: white; padding: 12px; font-size: 16px; width: 100%; border-radius: 0; -webkit-appearance: none; }
        .btn-gen { background: var(--gold); color: black; border: none; padding: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        #output { display: none; padding: 20px; border-top: 2px solid var(--gold); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .scen-title { color: var(--gold); font-size: 20px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        h3 { color: var(--gold); font-size: 13px; text-transform: uppercase; margin: 20px 0 8px; display: flex; align-items: center; border-left: 3px solid var(--gold); padding-left: 10px; }
        .text-block { font-size: 14px; line-height: 1.5; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 10px; }
        .team-box { margin-bottom: 15px; border-left: 2px solid #555; padding-left: 10px; }
        .team-a { border-color: #4d94ff; } .team-b { border-color: #ff4d4d; }
        .team-name { font-weight: bold; font-size: 12px; text-transform: uppercase; margin-bottom: 4px; }
        .team-a .team-name { color: #4d94ff; } .team-b .team-name { color: #ff4d4d; }
        .rules-box { border: 1px solid var(--red); background: rgba(168, 0, 0, 0.08); padding: 15px; margin-top: 20px; }
        .rules-list { font-size: 13px; padding-left: 18px; color: #ff9999; margin: 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="version-tag">scorpion.gen 3.5 | VS MODE</div>
    <header><h1>Сценарии к играм</h1></header>
    <div class="settings">
        <label>Локация</label>
        <select id="terrain">
            <option value="forest">Чистый лес</option>
            <option value="mixed" selected>Лес + Здания</option>
            <option value="cqb">CQB (Помещения)</option>
        </select>
        <label>Группа</label>
        <select id="players">
            <option value="small">Малая (0-10 чел)</option>
            <option value="mid">Средняя (10-25 чел)</option>
            <option value="large">Масштаб (25-50+ чел)</option>
        </select>
        <button class="btn-gen" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="output">
        <div id="out-name" class="scen-title"></div>
        <div id="out-meta" style="font-size: 10px; color: #777; text-transform: uppercase; margin-bottom: 15px;"></div>
        
        <h3>Брифинг / Легенда</h3>
        <div id="out-lore" class="text-block"></div>
        
        <h3>Задачи сторон</h3>
        <div class="team-box team-a">
            <div class="team-name">ГРУППА А (Атака / Желтые)</div>
            <div id="out-task-a" class="text-block" style="background: none; padding: 0;"></div>
        </div>
        <div class="team-box team-b">
            <div class="team-name">ГРУППА Б (Оборона / Синие)</div>
            <div id="out-task-b" class="text-block" style="background: none; padding: 0;"></div>
        </div>

        <div class="rules-box">
            <h4 id="rules-style-name" style="color: #ff4d4d; margin:0 0 10px 0; text-transform:uppercase; font-size:12px;"></h4>
            <ul id="out-rules" class="rules-list"></ul>
        </div>
    </div>
</div>

<script>
const database = {
    forest: {
        lores: [
            "Разведка обнаружила в лесу зашифрованный маяк. Его сигнал может выдать позиции штаба.",
            "В квадрате приземлился контейнер с гуманитарной помощью для окруженных сил.",
            "Группа диверсантов планирует взорвать мост через лесную реку, чтобы отрезать снабжение.",
            "Сбитый пилот скрывается в густой зеленке. Он несет важные коды шифрования.",
            "Противник обустроил в лесу мобильный госпиталь. Нужно захватить медикаменты."
        ],
        missions: [
            { a: "Найти маяк и удерживать его 10 минут для деактивации.", b: "Защищать маяк. Не дать противнику подойти ближе чем на 5 метров." },
            { a: "Эвакуировать пилота из центра леса на свою базу.", b: "Обнаружить пилота раньше и захватить его в плен." },
            { a: "Установить учебный заряд под 'мост' (дерево/ориентир).", b: "Патрулировать лесные тропы и сорвать попытку подрыва." }
        ]
    },
    mixed: {
        lores: [
            "Старый завод стал базой для переброски контрабандного оружия. Пора закрыть эту лавочку.",
            "Генератор здания в лесу — единственная точка питания для системы ПВО региона.",
            "В заброшенном комплексе удерживают информатора. Путь к нему лежит через плотный лес.",
            "Террористы готовят запуск ракеты из ангара. Лесной периметр заминирован.",
            "Колонна снабжения застряла между лесом и промзоной. Идет бой за груз."
        ],
        missions: [
            { a: "Отключить генератор в лесу, затем штурмовать здание и вынести сейф.", b: "Распределить силы: охрана генератора и оборона комнат в здании." },
            { a: "Пробиться через лес к центральному входу и захватить 2 этаж.", b: "Использовать лес для засад, чтобы не дать противнику дойти до здания." },
            { a: "Спасти заложника из здания и довести его живым до точки в лесу.", b: "Удерживать заложника внутри. В случае штурма — менять комнату." }
        ]
    },
    cqb: {
        lores: [
            "Здание полностью заминировано. Таймер уже запущен.",
            "Внутри офисного центра скрывается высокопоставленный перебежчик.",
            "Ночная облава на притон торговцев данными. Работа в узких коридорах.",
            "Захват серверной станции. Нужно предотвратить удаление файлов.",
            "Противник закрепился в бункере. Прямой штурм — единственный выход."
        ],
        missions: [
            { a: "Зачистить все помещения здания. Найти и вынести черный ящик.", b: "Организовать глухую оборону. Использовать щиты и баррикады." },
            { a: "Заложить бомбу в центре здания и защищать её 5 минут.", b: "Не допустить закладки. Если заложена — деактивировать (1 минута)." },
            { a: "Взять в плен лидера обороны (касание рукой).", b: "Защищать командира. В случае опасности — эвакуировать на крышу." }
        ]
    }
};

const tactics = {
    small: ["Работа в двойках.", "Скрытность приоритетнее огня.", "Использование ножей/пистолетов."],
    mid: ["Одна подгруппа отвлекает, вторая заходит с фланга.", "Контроль радиоэфира.", "Дымовая завеса."],
    large: ["Массированный штурм всеми силами.", "Подавление огнем из всех стволов.", "Работа тремя эшелонами."]
};

function getQueueKey(terrain, players) { return `v35_queue_${terrain}_${players}`; }

function generate() {
    const terrain = document.getElementById('terrain').value;
    const players = document.getElementById('players').value;
    const key = getQueueKey(terrain, players);
    
    let queue = JSON.parse(localStorage.getItem(key) || "[]");
    
    if (queue.length === 0) {
        const db = database[terrain];
        // Генерируем комбинации (Легенда x Миссия)
        for(let l=0; l < db.lores.length; l++) {
            for(let m=0; m < db.missions.length; m++) {
                queue.push({ loreIdx: l, missIdx: m });
            }
        }
        // Перемешивание
        for (let i = queue.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [queue[i], queue[j]] = [queue[j], queue[i]];
        }
    }

    const current = queue.shift();
    localStorage.setItem(key, JSON.stringify(queue));

    const db = database[terrain];
    const lore = db.lores[current.loreIdx];
    const mission = db.missions[current.missIdx];
    const tac = tactics[players][Math.floor(Math.random()*tactics[players].length)];

    document.getElementById('out-name').innerText = "ОПЕРАЦИЯ: " + (["ЦУНАМИ", "ГРАНИТ", "КОБРА", "ПРИЗРАК", "МЕТЕОР"][Math.floor(Math.random()*5)]);
    document.getElementById('out-meta').innerText = `${terrain} | ОСТАЛОСЬ УНИКАЛЬНЫХ СЦЕНАРИЕВ: ${queue.length}`;
    document.getElementById('out-lore').innerText = lore;
    document.getElementById('out-task-a').innerText = mission.a + "\n\nРЕКОМЕНДАЦИЯ: " + tac;
    document.getElementById('out-task-b').innerText = mission.b;

    const hitPresets = [
        { name: "КЛАССИКА", rules: ["Любой хит — смерть.", "Привод — смерть.", "Рикошет не считается."] },
        { name: "ТАКТИКА", rules: ["Конечность — ранение (бинт).", "Голова/Корпус — смерть.", "Медик лечит 20 сек."] }
    ];
    const preset = hitPresets[Math.floor(Math.random()*hitPresets.length)];
    document.getElementById('rules-style-name').innerText = "ПРАВИЛА: " + preset.name;
    const rulesUl = document.getElementById('out-rules');
    rulesUl.innerHTML = "";
    preset.rules.forEach(r => { rulesUl.innerHTML += `<li>${r}</li>`; });

    document.getElementById('output').style.display = 'block';
}
</script>
</body>
</html>
