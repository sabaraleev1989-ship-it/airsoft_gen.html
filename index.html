<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCORPION.GEN 2.5</title>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#c5a059">
    <style>
        :root { --gold: #c5a059; --dark-gold: #8b6d31; --bg: #050505; --red: #a80000; --text: #e5e5e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; border: 1px solid var(--gold); background: var(--bg); position: relative; min-height: 95vh; }
        .version-tag { position: absolute; top: 12px; left: 15px; color: var(--gold); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        header { text-align: center; padding: 40px 10px 15px; border-bottom: 1px solid var(--gold); }
        h1 { color: var(--gold); text-transform: uppercase; font-size: 18px; letter-spacing: 2px; margin: 0; }
        .settings { padding: 20px; display: grid; gap: 15px; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; }
        select { background: #1a1a1a; border: 1px solid var(--dark-gold); color: white; padding: 12px; font-size: 16px; width: 100%; }
        .btn-gen { background: var(--gold); color: black; border: none; padding: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        #output { display: none; padding: 20px; border-top: 2px solid var(--gold); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .scen-title { color: var(--gold); font-size: 20px; font-weight: bold; text-transform: uppercase; }
        .scen-meta { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 20px; }
        h3 { color: var(--gold); font-size: 13px; text-transform: uppercase; margin: 20px 0 8px; display: flex; align-items: center; }
        h3::before { content: ""; width: 4px; height: 14px; background: var(--gold); margin-right: 10px; }
        .text-block { font-size: 14px; line-height: 1.6; color: #ccc; background: rgba(255,255,255,0.03); padding: 12px; }
        .rules-box { border: 1px solid var(--red); background: rgba(168, 0, 0, 0.08); padding: 15px; margin-top: 25px; }
        .rules-list { font-size: 13px; padding-left: 18px; color: #ff9999; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="version-tag">scorpion.gen 2.5</div>
    <header><h1>Сценарии к играм</h1></header>
    <div class="settings">
        <label>Локация</label>
        <select id="terrain">
            <option value="forest">Чистый лес</option>
            <option value="mixed" selected>Лес + Здания (Гибрид)</option>
            <option value="cqb">CQB (Помещения)</option>
        </select>
        <label>Группа</label>
        <select id="players">
            <option value="small">Малая (0-10 чел)</option>
            <option value="mid">Средняя (10-25 чел)</option>
            <option value="large">Масштаб (25-50+ чел)</option>
        </select>
        <button class="btn-gen" onclick="generate()">Сформировать приказ</button>
    </div>

    <div id="output">
        <div id="out-name" class="scen-title"></div>
        <div id="out-meta" class="scen-meta"></div>
        <h3>Оперативная легенда</h3>
        <div id="out-lore" class="text-block"></div>
        <h3>Боевая задача</h3>
        <div id="out-task" class="text-block"></div>
        <div class="rules-box">
            <h4 id="rules-style-name" style="color: #ff4d4d; margin:0 0 10px 0; text-transform:uppercase; font-size:12px;"></h4>
            <ul id="out-rules" class="rules-list"></ul>
        </div>
    </div>
</div>

<script>
const data = {
    names: ["Стальное Жало", "Код Зеро", "Линия Фронта", "Тени Адлера", "Черный Октябрь", "Вектор А", "Тихий Шторм", "Горный Осел", "Красная Зона", "Слепое Пятно"],
    
    lores: [
        "По данным радиоперехвата, в квадрате обнаружена точка сбора наемников. Противник готовит прорыв. Ваша задача — сорвать их планы.",
        "Критический сбой спутниковой связи. В лесу приземлился секретный модуль. Обе стороны выслали группы захвата.",
        "Террористы захватили ключевой объект инфраструктуры. Переговоры бесполезны. Только силовой сценарий.",
        "Разведка подтвердила наличие подпольной лаборатории. Объект охраняется 'дикими' отрядами. Нужно провести зачистку.",
        "Конвой с боеприпасами попал в засаду. Группе 'Скорпион' приказано отбить груз и эвакуировать выживших."
    ],

    // База компонентов для 100+ комбинаций
    parts: {
        forest: {
            objs: ["схрон с картами", "сбитый пилот", "мобильная антенна", "замаскированный дот", "командир отряда"],
            actions: ["найти и уничтожить", "эвакуировать на базу", "удержать 15 минут", "пометить дымом", "захватить в плен"],
            small: ["Скрытно просочиться через посты.", "Действовать только ножами и пистолетами до контакта.", "Установить 3 растяжки на тропах."],
            large: ["Организовать сплошную линию обороны.", "Разделить отряд на 3 ударные группы.", "Использовать дымовую завесу при штурме."]
        },
        mixed: {
            objs: ["центр связи в здании", "генератор в лесу", "снайперская лежка", "склад БК", "заложник на 2 этаже"],
            actions: ["отключить питание в лесу и штурмовать", "блокировать выходы", "выбить противника в зеленку", "удержать периметр"],
            small: ["Один боец должен незаметно залезть в окно.", "Использовать лес для отхода после диверсии."],
            large: ["Подавляющий огонь из леса по окнам.", "Одновременный штурм с трех направлений."]
        },
        cqb: {
            objs: ["электронная бомба", "жесткий диск", "ящик с медикаментами", "вип-персона", "арсенал"],
            actions: ["деактивировать за 5 минут", "вынести из здания", "зачистить каждый угол", "держать круговую оборону"],
            small: ["Работа парами. Использовать щит.", "Бесшумный вход."],
            large: ["Закидать здание гранатами перед входом.", "Контролировать все окна снаружи."]
        }
    },

    hitPresets: [
        { name: "СТИЛЬ: КЛАССИКА", rules: ["Один шар — один выход.", "Попадание в привод — смерть.", "Рикошет не считается."] },
        { name: "СТИЛЬ: ТАКТИКА", rules: ["Ранение в конечность — только вторичка.", "Медик лечит бинтом 30 сек.", "Повторное — смерть."] },
        { name: "СТИЛЬ: ХАРДКОР", rules: ["Попадание в шлем — контузия 1 мин.", "Оружие выбивается навсегда.", "Плен при касании."] }
    ]
};

function generate() {
    const terrain = document.getElementById('terrain').value;
    const players = document.getElementById('players').value;
    
    const p = data.parts[terrain];
    const obj = p.objs[Math.floor(Math.random() * p.objs.length)];
    const act = p.actions[Math.floor(Math.random() * p.actions.length)];
    const extra = p[players][Math.floor(Math.random() * p[players].length)];

    document.getElementById('out-name').innerText = "ОПЕРАЦИЯ: " + data.names[Math.floor(Math.random() * data.names.length)];
    document.getElementById('out-meta').innerText = `Локация: ${terrain} | Группа: ${players}`;
    document.getElementById('out-lore').innerText = data.lores[Math.floor(Math.random() * data.lores.length)];
    document.getElementById('out-task').innerText = `Основная цель: ${obj.toUpperCase()}. Вам необходимо ${act}. \n\nТактическая вводная: ${extra}`;

    const preset = data.hitPresets[Math.floor(Math.random() * data.hitPresets.length)];
    document.getElementById('rules-style-name').innerText = preset.name;
    const rulesUl = document.getElementById('out-rules');
    rulesUl.innerHTML = "";
    preset.rules.forEach(r => { rulesUl.innerHTML += `<li>${r}</li>`; });

    document.getElementById('output').style.display = 'block';
    window.scrollTo({ top: document.getElementById('output').offsetTop, behavior: 'smooth' });
}
</script>
</body>
</html>
